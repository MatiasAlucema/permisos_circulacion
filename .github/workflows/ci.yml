name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ api/ tests/ config/
      - run: ruff format --check src/ api/ tests/ config/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx anyio pytest-anyio

      - name: Generate data
        run: python src/data_generation.py

      - name: Clean data
        run: python src/data_cleaning.py

      - name: Train model
        run: python src/train.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install, generate data, and train
        run: |
          pip install -r requirements.txt
          python src/data_generation.py
          python src/data_cleaning.py
          python src/train.py

      - name: Build Docker image
        run: docker build -t permisos-api:test .

      - name: Test Docker image health
        run: |
          docker run -d --name test-api -p 8000:8000 permisos-api:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
